<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leaderboard - TaoNet</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" type="image/svg+xml" href="/icon.svg">
</head>
<body>
  <header class="header">
    <div class="container header-inner">
      <a href="/" class="logo">TaoNet</a>
      <nav class="nav">
        <a href="mine.html">Mine</a>
        <a href="dashboard.html">Dashboard</a>
        <a href="leaderboard.html" class="active">Leaderboard</a>
        <a href="rewards.html">Rewards</a>
      </nav>
      <button class="wallet-btn" data-wallet-btn onclick="TAONET.wallet ? TAONET.disconnectWallet() : TAONET.connectWallet()">Connect Wallet</button>
      <button class="menu-toggle" onclick="document.querySelector('.nav').classList.toggle('open')">☰</button>
    </div>
  </header>

  <main class="container" style="padding-top: 40px; padding-bottom: 60px;">
    <h1 style="font-size: 2rem; margin-bottom: 10px;">Leaderboard</h1>
    <p class="text-dim" style="margin-bottom: 30px;">Top miners by total rewards earned</p>

    <!-- Filter Tabs -->
    <div class="tabs">
      <button class="tab active" onclick="loadLeaderboard('rewards')">By Rewards</button>
      <button class="tab" onclick="loadLeaderboard('tasks')">By Tasks</button>
      <button class="tab" onclick="loadLeaderboard('streak')">By Streak</button>
    </div>

    <!-- Leaderboard Table -->
    <div class="card">
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>Rank</th>
              <th>Miner</th>
              <th>Tier</th>
              <th>Tasks</th>
              <th>Rewards</th>
            </tr>
          </thead>
          <tbody id="leaderboardBody">
            <tr>
              <td colspan="5" style="text-align: center; padding: 40px;">Loading...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <style>
    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }
    .tab {
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text-dim);
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }
    .tab:hover { border-color: var(--green); color: var(--text); }
    .tab.active { background: var(--green); color: var(--bg); border-color: var(--green); }
    
    .rank-cell {
      font-weight: 700;
      font-size: 1.1rem;
    }
    .rank-1 { color: var(--gold); }
    .rank-2 { color: var(--silver); }
    .rank-3 { color: var(--bronze); }
    
    .miner-info {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .miner-avatar {
      width: 36px;
      height: 36px;
      background: var(--border);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.9rem;
    }
    .miner-name { font-weight: 500; }
    .miner-address { font-size: 0.75rem; color: var(--text-dim); }
    
    .tier-badge-sm {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 4px;
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
    }
    .tier-badge-sm.bronze { background: rgba(205, 127, 50, 0.15); color: var(--bronze); }
    .tier-badge-sm.silver { background: rgba(192, 192, 192, 0.15); color: var(--silver); }
    .tier-badge-sm.gold { background: rgba(255, 215, 0, 0.15); color: var(--gold); }
    .tier-badge-sm.platinum { background: rgba(229, 228, 226, 0.15); color: var(--platinum); }
    .tier-badge-sm.diamond { background: rgba(185, 242, 255, 0.15); color: var(--diamond); }
    
    .rewards-cell { color: var(--green); font-weight: 600; }
  </style>

  <script src="taonet.js"></script>
  <script>
    let currentSort = 'rewards';

    async function loadLeaderboard(sortBy = 'rewards') {
      currentSort = sortBy;
      
      // Update tabs
      document.querySelectorAll('.tab').forEach((tab, i) => {
        tab.classList.toggle('active', 
          (sortBy === 'rewards' && i === 0) ||
          (sortBy === 'tasks' && i === 1) ||
          (sortBy === 'streak' && i === 2)
        );
      });

      const tbody = document.getElementById('leaderboardBody');
      tbody.innerHTML = '<tr><td colspan="5" style="text-align: center; padding: 40px;">Loading...</td></tr>';

      try {
        const data = await TAONET.fetchAPI('/api/miners/leaderboard?limit=100&sort=' + sortBy);
        
        if (!data?.miners?.length) {
          tbody.innerHTML = '<tr><td colspan="5" style="text-align: center; padding: 40px;" class="text-dim">No miners yet. Be the first!</td></tr>';
          return;
        }

        tbody.innerHTML = data.miners.map((miner, i) => {
          const rank = i + 1;
          const rankClass = rank <= 3 ? 'rank-' + rank : '';
          const tier = miner.tier || 'bronze';
          const initial = (miner.name || 'M')[0].toUpperCase();
          
          return `
            <tr>
              <td><span class="rank-cell ${rankClass}">#${rank}</span></td>
              <td>
                <div class="miner-info">
                  <div class="miner-avatar">${initial}</div>
                  <div>
                    <div class="miner-name">${miner.name || 'Anonymous'}</div>
                    <div class="miner-address">${TAONET.shortAddress(miner.address)}</div>
                  </div>
                </div>
              </td>
              <td><span class="tier-badge-sm ${tier}">${tier}</span></td>
              <td>${(miner.tasksCompleted || 0).toLocaleString()}</td>
              <td class="rewards-cell">${(miner.totalRewards || 0).toLocaleString()}</td>
            </tr>
          `;
        }).join('');
      } catch(e) {
        tbody.innerHTML = '<tr><td colspan="5" style="text-align: center; padding: 40px;" class="text-dim">Failed to load leaderboard</td></tr>';
      }
    }

    // Init
    loadLeaderboard();
  </script>
</body>
</html>
