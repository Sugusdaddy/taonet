<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leaderboard - TaoNet</title>
  <link rel="icon" type="image/svg+xml" href="icon.svg">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="header">
    <div class="container header-inner">
      <a href="/" class="logo">Tao<span>Net</span></a>
      <nav class="nav">
        <a href="mine.html">Mine</a>
        <a href="dashboard.html">Dashboard</a>
        <a href="leaderboard.html" class="active">Leaderboard</a>
        <a href="rewards.html">Rewards</a>
        <a href="docs.html">Docs</a>
      </nav>
      <div class="header-actions">
        <button class="wallet-btn" data-wallet-btn onclick="handleWalletClick()">Connect</button>
        <button class="menu-btn" onclick="toggleMenu()">&#9776;</button>
      </div>
    </div>
  </header>

  <main>
    <div class="container">
      <div class="page-header">
        <h1 class="page-title">Leaderboard</h1>
        <p class="page-subtitle">Top miners ranked by performance</p>
      </div>

      <!-- Tabs -->
      <div class="tabs mb-lg">
        <button class="tab active" data-sort="totalRewards">By Rewards</button>
        <button class="tab" data-sort="tasksCompleted">By Tasks</button>
        <button class="tab" data-sort="streak">By Streak</button>
      </div>

      <!-- Table -->
      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th>Rank</th>
              <th>Miner</th>
              <th>Tier</th>
              <th>Tasks</th>
              <th>Rewards</th>
            </tr>
          </thead>
          <tbody id="leaderboardBody">
            <tr>
              <td colspan="5" class="text-center text-tertiary" style="padding: 60px;">Loading...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <style>
    .tabs {
      display: flex;
      gap: var(--space-sm);
      flex-wrap: wrap;
    }
    
    .tab {
      padding: 10px 20px;
      font-family: var(--font-sans);
      font-size: 14px;
      font-weight: 500;
      color: var(--text-tertiary);
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-full);
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .tab:hover {
      color: var(--text-primary);
      border-color: var(--text-tertiary);
    }
    
    .tab.active {
      background: var(--accent);
      color: #000;
      border-color: var(--accent);
    }
    
    .rank-cell {
      font-weight: 700;
      font-size: 16px;
    }
    
    .rank-1 { color: var(--gold); }
    .rank-2 { color: var(--silver); }
    .rank-3 { color: var(--bronze); }
    
    .miner-cell {
      display: flex;
      align-items: center;
      gap: var(--space-md);
    }
    
    .miner-avatar {
      width: 36px;
      height: 36px;
      background: var(--bg-tertiary);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: 14px;
    }
    
    .miner-name {
      font-weight: 500;
    }
    
    .miner-address {
      font-size: 12px;
      color: var(--text-tertiary);
      font-family: var(--font-mono);
    }
    
    .rewards-cell {
      color: var(--accent);
      font-weight: 600;
    }
  </style>

  <script src="app.js"></script>
  <script>
    let currentSort = 'totalRewards';
    
    // Tab clicks
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        currentSort = tab.dataset.sort;
        loadLeaderboard();
      });
    });
    
    async function loadLeaderboard() {
      const tbody = document.getElementById('leaderboardBody');
      tbody.innerHTML = '<tr><td colspan="5" class="text-center text-tertiary" style="padding: 60px;">Loading...</td></tr>';
      
      const data = await TAONET.getLeaderboard(currentSort, 100);
      
      if (!data?.miners?.length) {
        tbody.innerHTML = '<tr><td colspan="5" class="text-center text-tertiary" style="padding: 60px;">No miners yet. Be the first!</td></tr>';
        return;
      }
      
      tbody.innerHTML = data.miners.map((miner, i) => {
        const rank = i + 1;
        const rankClass = rank <= 3 ? `rank-${rank}` : '';
        const tier = (miner.tier || 'bronze').toLowerCase();
        const initial = (miner.name || 'M')[0].toUpperCase();
        const isYou = TAONET.wallet && miner.address === TAONET.wallet;
        
        return `
          <tr ${isYou ? 'style="background: var(--accent-bg);"' : ''}>
            <td><span class="rank-cell ${rankClass}">#${rank}</span></td>
            <td>
              <div class="miner-cell">
                <div class="miner-avatar">${initial}</div>
                <div>
                  <div class="miner-name">${miner.name || 'Anonymous'}${isYou ? ' (You)' : ''}</div>
                  <div class="miner-address">${TAONET.shortAddress(miner.address)}</div>
                </div>
              </div>
            </td>
            <td><span class="badge badge-${tier}">${tier}</span></td>
            <td>${(miner.tasksCompleted || 0).toLocaleString()}</td>
            <td class="rewards-cell">${(miner.totalRewards || 0).toLocaleString()}</td>
          </tr>
        `;
      }).join('');
    }
    
    loadLeaderboard();
  </script>
</body>
</html>
