<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Achievements - TaoNet</title>
  <link rel="icon" type="image/svg+xml" href="icon.svg">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="header">
    <div class="container header-inner">
      <a href="/" class="logo">Tao<span>Net</span></a>
      <nav class="nav">
        <a href="mine.html">Mine</a>
        <a href="dashboard.html">Dashboard</a>
        <a href="leaderboard.html">Leaderboard</a>
        <a href="rewards.html">Rewards</a>
        <a href="docs.html">Docs</a>
      </nav>
      <div class="header-actions">
        <button class="wallet-btn" data-wallet-btn onclick="handleWalletClick()">Connect</button>
        <button class="menu-btn" onclick="toggleMenu()">&#9776;</button>
      </div>
    </div>
  </header>

  <main>
    <div class="container">
      <div class="page-header">
        <h1 class="page-title">Achievements</h1>
        <p class="page-subtitle">Unlock achievements to earn bonus rewards</p>
      </div>

      <!-- Progress -->
      <div class="achievement-progress mb-lg">
        <div class="progress-labels">
          <span>Your Progress</span>
          <span><span id="unlockedCount">0</span> / <span id="totalCount">30</span> unlocked</span>
        </div>
        <div class="progress">
          <div class="progress-fill" id="achievementProgress" style="width: 0%;"></div>
        </div>
      </div>

      <!-- Categories -->
      <div id="achievementsContainer">
        <div class="text-center text-tertiary" style="padding: 60px;">Loading achievements...</div>
      </div>
    </div>
  </main>

  <style>
    .achievement-progress {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: var(--space-lg);
    }
    
    .achievement-category {
      margin-bottom: var(--space-xl);
    }
    
    .category-title {
      font-size: 14px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-tertiary);
      margin-bottom: var(--space-md);
    }
    
    .achievements-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: var(--space-md);
    }
    
    .achievement-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: var(--space-lg);
      display: flex;
      gap: var(--space-md);
      transition: border-color 0.2s;
    }
    
    .achievement-card.unlocked {
      border-color: var(--accent-border);
      background: var(--accent-bg);
    }
    
    .achievement-card.locked {
      opacity: 0.6;
    }
    
    .achievement-icon {
      width: 48px;
      height: 48px;
      background: var(--bg-tertiary);
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      flex-shrink: 0;
    }
    
    .achievement-card.unlocked .achievement-icon {
      background: var(--accent);
    }
    
    .achievement-name {
      font-weight: 600;
      margin-bottom: var(--space-xs);
    }
    
    .achievement-desc {
      font-size: 13px;
      color: var(--text-tertiary);
      margin-bottom: var(--space-sm);
    }
    
    .achievement-reward {
      font-size: 12px;
      color: var(--accent);
      font-weight: 500;
    }
  </style>

  <script src="app.js"></script>
  <script>
    async function loadAchievements() {
      const container = document.getElementById('achievementsContainer');
      
      const data = await TAONET.getAchievements();
      const userAchievements = TAONET.miner?.achievements || [];
      
      if (!data?.achievements?.length) {
        container.innerHTML = '<p class="text-center text-tertiary">No achievements available</p>';
        return;
      }
      
      // Group by category
      const categories = {};
      data.achievements.forEach(a => {
        const cat = a.category || 'general';
        if (!categories[cat]) categories[cat] = [];
        categories[cat].push(a);
      });
      
      // Count unlocked
      const unlocked = data.achievements.filter(a => userAchievements.includes(a.id)).length;
      document.getElementById('unlockedCount').textContent = unlocked;
      document.getElementById('totalCount').textContent = data.achievements.length;
      document.getElementById('achievementProgress').style.width = (unlocked / data.achievements.length * 100) + '%';
      
      // Render
      container.innerHTML = Object.entries(categories).map(([cat, achievements]) => `
        <div class="achievement-category">
          <h3 class="category-title">${cat}</h3>
          <div class="achievements-grid">
            ${achievements.map(a => {
              const isUnlocked = userAchievements.includes(a.id);
              return `
                <div class="achievement-card ${isUnlocked ? 'unlocked' : 'locked'}">
                  <div class="achievement-icon">${a.icon || '?'}</div>
                  <div>
                    <div class="achievement-name">${a.name}</div>
                    <div class="achievement-desc">${a.description}</div>
                    <div class="achievement-reward">+${a.xpReward || 0} XP, +${a.tokenReward || 0} tokens</div>
                  </div>
                </div>
              `;
            }).join('')}
          </div>
        </div>
      `).join('');
    }
    
    document.addEventListener('DOMContentLoaded', () => {
      setTimeout(loadAchievements, 100);
    });
  </script>
</body>
</html>
