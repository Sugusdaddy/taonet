<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - TaoNet</title>
  <link rel="icon" type="image/svg+xml" href="icon.svg">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="header">
    <div class="container header-inner">
      <a href="/" class="logo">Tao<span>Net</span></a>
      <nav class="nav">
        <a href="mine.html">Mine</a>
        <a href="dashboard.html">Dashboard</a>
        <a href="leaderboard.html">Leaderboard</a>
        <a href="rewards.html">Rewards</a>
        <a href="docs.html">Docs</a>
      </nav>
      <div class="header-actions">
        <button class="wallet-btn" data-wallet-btn onclick="handleWalletClick()">Connect</button>
        <button class="menu-btn" onclick="toggleMenu()">&#9776;</button>
      </div>
    </div>
  </header>

  <main>
    <div class="container">
      <div class="page-header">
        <h1 class="page-title">Admin Dashboard</h1>
        <p class="page-subtitle">Network management and analytics</p>
      </div>

      <!-- Network Overview -->
      <div class="stats-grid mb-lg">
        <div class="stat-card">
          <div class="stat-value" id="totalMiners">-</div>
          <div class="stat-label">Total Miners</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="onlineMiners">-</div>
          <div class="stat-label">Online Now</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="totalTasks">-</div>
          <div class="stat-label">Total Tasks</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="totalRewards">-</div>
          <div class="stat-label">Rewards Paid</div>
        </div>
      </div>

      <div class="grid-2">
        <!-- Recent Miners -->
        <div class="card">
          <div class="card-header">
            <h3 class="card-title">Recent Miners</h3>
          </div>
          <div id="recentMiners">
            <p class="text-tertiary">Loading...</p>
          </div>
        </div>

        <!-- Network Activity -->
        <div class="card">
          <div class="card-header">
            <h3 class="card-title">Activity (24h)</h3>
          </div>
          <div id="activityChart">
            <div class="chart-placeholder">
              <p class="text-tertiary">Loading chart...</p>
            </div>
          </div>
        </div>
      </div>

      <!-- Jackpot Status -->
      <div class="card mt-lg">
        <div class="card-header">
          <h3 class="card-title">Jackpot Status</h3>
        </div>
        <div class="grid-4" id="jackpotStatus">
          <div class="jackpot-mini">
            <div class="jackpot-type">Mini</div>
            <div class="jackpot-info">Loading...</div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <style>
    .miner-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: var(--space-md) 0;
      border-bottom: 1px solid var(--border);
      font-size: 14px;
    }
    
    .miner-row:last-child {
      border-bottom: none;
    }
    
    .chart-placeholder {
      height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-tertiary);
      border-radius: var(--radius-md);
    }
    
    .jackpot-mini, .jackpot-regular, .jackpot-mega, .jackpot-ultra {
      background: var(--bg-tertiary);
      border-radius: var(--radius-md);
      padding: var(--space-md);
      text-align: center;
    }
    
    .jackpot-type {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      color: var(--text-tertiary);
      margin-bottom: var(--space-xs);
    }
    
    .jackpot-info {
      font-size: 14px;
    }
  </style>

  <script src="app.js"></script>
  <script>
    async function loadAdmin() {
      try {
        const [stats, jackpots, leaderboard] = await Promise.all([
          TAONET.getStats(),
          TAONET.getJackpots(),
          TAONET.getLeaderboard('createdAt', 10)
        ]);
        
        // Stats
        if (stats) {
          document.getElementById('totalMiners').textContent = stats.network?.totalMiners || 0;
          document.getElementById('onlineMiners').textContent = stats.network?.onlineMiners || 0;
          document.getElementById('totalTasks').textContent = TAONET.formatNumber(stats.tasks?.completed || 0);
          document.getElementById('totalRewards').textContent = TAONET.formatNumber(stats.rewards?.total || 0);
        }
        
        // Recent miners
        if (leaderboard?.miners) {
          document.getElementById('recentMiners').innerHTML = leaderboard.miners.slice(0, 5).map(m => `
            <div class="miner-row">
              <div>
                <div class="font-semibold">${m.name || 'Anonymous'}</div>
                <div class="text-tertiary font-mono" style="font-size: 12px;">${TAONET.shortAddress(m.address)}</div>
              </div>
              <span class="badge badge-${m.tier || 'bronze'}">${m.tier || 'bronze'}</span>
            </div>
          `).join('');
        }
        
        // Jackpots
        if (jackpots?.jackpots) {
          document.getElementById('jackpotStatus').innerHTML = jackpots.jackpots.map(jp => `
            <div class="jackpot-${jp.type}">
              <div class="jackpot-type">${jp.type}</div>
              <div class="jackpot-info">${jp.tasksUntilTrigger} tasks left</div>
            </div>
          `).join('');
        }
      } catch(e) {
        console.error('Failed to load admin:', e);
      }
    }
    
    loadAdmin();
    setInterval(loadAdmin, 30000);
  </script>
</body>
</html>
