<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tournaments - TaoNet</title>
  <link rel="icon" type="image/svg+xml" href="icon.svg">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="header">
    <div class="container header-inner">
      <a href="/" class="logo">Tao<span>Net</span></a>
      <nav class="nav">
        <a href="mine.html">Mine</a>
        <a href="dashboard.html">Dashboard</a>
        <a href="leaderboard.html">Leaderboard</a>
        <a href="rewards.html">Rewards</a>
        <a href="docs.html">Docs</a>
      </nav>
      <div class="header-actions">
        <button class="wallet-btn" data-wallet-btn onclick="handleWalletClick()">Connect</button>
        <button class="menu-btn" onclick="toggleMenu()">&#9776;</button>
      </div>
    </div>
  </header>

  <main>
    <div class="container">
      <div class="page-header">
        <h1 class="page-title">Tournaments</h1>
        <p class="page-subtitle">Compete for bonus prize pools</p>
      </div>

      <!-- Active Tournaments -->
      <div id="tournamentsContainer">
        <div class="text-center text-tertiary" style="padding: 60px;">Loading tournaments...</div>
      </div>
    </div>
  </main>

  <style>
    .tournament-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      padding: var(--space-xl);
      margin-bottom: var(--space-lg);
    }
    
    .tournament-header {
      display: flex;
      justify-content: space-between;
      align-items: start;
      margin-bottom: var(--space-lg);
    }
    
    .tournament-title {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: var(--space-xs);
    }
    
    .tournament-status {
      padding: 6px 12px;
      border-radius: var(--radius-full);
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
    }
    
    .status-active {
      background: var(--accent-bg);
      color: var(--accent);
    }
    
    .status-upcoming {
      background: rgba(255, 159, 10, 0.12);
      color: var(--orange);
    }
    
    .status-ended {
      background: var(--bg-tertiary);
      color: var(--text-tertiary);
    }
    
    .tournament-info {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: var(--space-md);
      margin-bottom: var(--space-xl);
    }
    
    @media (max-width: 768px) {
      .tournament-info { grid-template-columns: repeat(2, 1fr); }
    }
    
    .info-item {
      text-align: center;
      padding: var(--space-md);
      background: var(--bg-tertiary);
      border-radius: var(--radius-md);
    }
    
    .info-value {
      font-size: 24px;
      font-weight: 700;
      color: var(--accent);
    }
    
    .info-label {
      font-size: 12px;
      color: var(--text-tertiary);
      margin-top: var(--space-xs);
    }
    
    .prize-distribution {
      margin-bottom: var(--space-lg);
    }
    
    .prize-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: var(--space-md) 0;
      border-bottom: 1px solid var(--border);
    }
    
    .prize-row:last-child {
      border-bottom: none;
    }
    
    .prize-rank {
      font-weight: 600;
    }
    
    .prize-rank.gold { color: var(--gold); }
    .prize-rank.silver { color: var(--silver); }
    .prize-rank.bronze { color: var(--bronze); }
    
    .prize-amount {
      color: var(--accent);
      font-weight: 600;
    }
    
    .tournament-leaderboard h4 {
      margin-bottom: var(--space-md);
    }
  </style>

  <script src="app.js"></script>
  <script>
    async function loadTournaments() {
      const container = document.getElementById('tournamentsContainer');
      
      const data = await TAONET.getTournaments();
      
      if (!data?.tournaments?.length) {
        container.innerHTML = `
          <div class="text-center" style="padding: 60px;">
            <h3 class="mb-sm">No Active Tournaments</h3>
            <p class="text-tertiary">Check back later for upcoming competitions</p>
          </div>
        `;
        return;
      }
      
      container.innerHTML = data.tournaments.map(t => {
        const now = Date.now();
        const start = new Date(t.startTime).getTime();
        const end = new Date(t.endTime).getTime();
        
        let status = 'upcoming';
        let statusText = 'Upcoming';
        if (now >= start && now <= end) {
          status = 'active';
          statusText = 'Active';
        } else if (now > end) {
          status = 'ended';
          statusText = 'Ended';
        }
        
        const timeLeft = status === 'active' ? Math.floor((end - now) / 1000 / 60 / 60) : 0;
        
        return `
          <div class="tournament-card">
            <div class="tournament-header">
              <div>
                <h2 class="tournament-title">${t.name}</h2>
                <p class="text-secondary">${t.description || 'Compete for prizes'}</p>
              </div>
              <span class="tournament-status status-${status}">${statusText}</span>
            </div>
            
            <div class="tournament-info">
              <div class="info-item">
                <div class="info-value">${TAONET.formatNumber(t.prizePool)}</div>
                <div class="info-label">Prize Pool</div>
              </div>
              <div class="info-item">
                <div class="info-value">${t.participants || 0}</div>
                <div class="info-label">Participants</div>
              </div>
              <div class="info-item">
                <div class="info-value">${status === 'active' ? timeLeft + 'h' : '-'}</div>
                <div class="info-label">Time Left</div>
              </div>
              <div class="info-item">
                <div class="info-value">#${t.yourRank || '-'}</div>
                <div class="info-label">Your Rank</div>
              </div>
            </div>
            
            <div class="prize-distribution">
              <h4 class="mb-md">Prize Distribution</h4>
              ${(t.prizes || []).map((prize, i) => `
                <div class="prize-row">
                  <span class="prize-rank ${i === 0 ? 'gold' : i === 1 ? 'silver' : i === 2 ? 'bronze' : ''}">#${i + 1}</span>
                  <span class="prize-amount">${TAONET.formatNumber(prize)} tokens</span>
                </div>
              `).join('')}
            </div>
            
            ${status === 'active' ? `
              <a href="mine.html" class="btn btn-primary w-full">Start Mining to Compete</a>
            ` : ''}
          </div>
        `;
      }).join('');
    }
    
    loadTournaments();
  </script>
</body>
</html>
