<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Network Health - TaoNet</title>
  <link rel="icon" type="image/svg+xml" href="icon.svg">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="header">
    <div class="container header-inner">
      <a href="/" class="logo">Tao<span>Net</span></a>
      <nav class="nav">
        <a href="mine.html">Mine</a>
        <a href="dashboard.html">Dashboard</a>
        <a href="leaderboard.html">Leaderboard</a>
        <a href="rewards.html">Rewards</a>
        <a href="docs.html">Docs</a>
      </nav>
      <div class="header-actions">
        <button class="wallet-btn" data-wallet-btn onclick="handleWalletClick()">Connect</button>
        <button class="menu-btn" onclick="toggleMenu()">&#9776;</button>
      </div>
    </div>
  </header>

  <main>
    <div class="container">
      <div class="page-header">
        <h1 class="page-title">Network Health</h1>
        <p class="page-subtitle">Real-time system status</p>
      </div>

      <!-- Status Banner -->
      <div class="status-banner mb-lg" id="statusBanner">
        <div class="status-indicator" id="statusIndicator"></div>
        <div>
          <h3 id="statusTitle">Checking...</h3>
          <p class="text-secondary" id="statusSubtitle">Loading system status</p>
        </div>
      </div>

      <!-- Services -->
      <div class="card mb-lg">
        <div class="card-header">
          <h3 class="card-title">Services</h3>
          <span class="text-tertiary" id="lastUpdated">-</span>
        </div>
        
        <div class="services-list" id="servicesList">
          <div class="service-item">
            <span>Loading...</span>
          </div>
        </div>
      </div>

      <!-- Network Stats -->
      <div class="stats-grid mb-lg">
        <div class="stat-card">
          <div class="stat-value" id="totalMiners">-</div>
          <div class="stat-label">Total Miners</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="onlineMiners">-</div>
          <div class="stat-label">Online Now</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="tasksToday">-</div>
          <div class="stat-label">Tasks Today</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="avgLatency">-</div>
          <div class="stat-label">Avg Latency</div>
        </div>
      </div>

      <!-- Uptime -->
      <div class="card">
        <div class="card-header">
          <h3 class="card-title">Uptime</h3>
        </div>
        <div class="uptime-grid">
          <div class="uptime-item">
            <span class="uptime-label">API</span>
            <div class="uptime-bar" id="apiUptime"></div>
            <span class="uptime-value" id="apiUptimeValue">-</span>
          </div>
          <div class="uptime-item">
            <span class="uptime-label">Tasks</span>
            <div class="uptime-bar" id="tasksUptime"></div>
            <span class="uptime-value" id="tasksUptimeValue">-</span>
          </div>
          <div class="uptime-item">
            <span class="uptime-label">Database</span>
            <div class="uptime-bar" id="dbUptime"></div>
            <span class="uptime-value" id="dbUptimeValue">-</span>
          </div>
        </div>
      </div>
    </div>
  </main>

  <style>
    .status-banner {
      display: flex;
      align-items: center;
      gap: var(--space-lg);
      padding: var(--space-xl);
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
    }
    
    .status-banner.operational {
      border-color: var(--accent-border);
      background: var(--accent-bg);
    }
    
    .status-banner.degraded {
      border-color: rgba(255, 159, 10, 0.3);
      background: rgba(255, 159, 10, 0.1);
    }
    
    .status-banner.down {
      border-color: rgba(255, 69, 58, 0.3);
      background: rgba(255, 69, 58, 0.1);
    }
    
    .status-indicator {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: var(--text-tertiary);
    }
    
    .status-banner.operational .status-indicator {
      background: var(--accent);
    }
    
    .status-banner.degraded .status-indicator {
      background: var(--orange);
    }
    
    .status-banner.down .status-indicator {
      background: var(--red);
    }
    
    .services-list {
      display: flex;
      flex-direction: column;
    }
    
    .service-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: var(--space-md) 0;
      border-bottom: 1px solid var(--border);
    }
    
    .service-item:last-child {
      border-bottom: none;
    }
    
    .service-status {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
      font-size: 14px;
    }
    
    .service-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }
    
    .service-dot.up { background: var(--accent); }
    .service-dot.degraded { background: var(--orange); }
    .service-dot.down { background: var(--red); }
    
    .uptime-grid {
      display: flex;
      flex-direction: column;
      gap: var(--space-md);
    }
    
    .uptime-item {
      display: flex;
      align-items: center;
      gap: var(--space-md);
    }
    
    .uptime-label {
      width: 80px;
      font-size: 14px;
      color: var(--text-secondary);
    }
    
    .uptime-bar {
      flex: 1;
      height: 8px;
      background: var(--bg-tertiary);
      border-radius: var(--radius-full);
      overflow: hidden;
      display: flex;
    }
    
    .uptime-bar-fill {
      height: 100%;
      background: var(--accent);
    }
    
    .uptime-value {
      width: 60px;
      text-align: right;
      font-size: 14px;
      color: var(--accent);
    }
  </style>

  <script src="app.js"></script>
  <script>
    async function loadHealth() {
      try {
        const [health, stats] = await Promise.all([
          TAONET.getHealth(),
          TAONET.getStats()
        ]);
        
        // Update status banner
        const banner = document.getElementById('statusBanner');
        const title = document.getElementById('statusTitle');
        const subtitle = document.getElementById('statusSubtitle');
        
        if (health?.status === 'ok') {
          banner.className = 'status-banner mb-lg operational';
          title.textContent = 'All Systems Operational';
          subtitle.textContent = 'TaoNet is running normally';
        } else {
          banner.className = 'status-banner mb-lg degraded';
          title.textContent = 'Degraded Performance';
          subtitle.textContent = 'Some services may be slow';
        }
        
        // Update services
        const services = [
          { name: 'API Server', status: health?.status === 'ok' ? 'up' : 'down' },
          { name: 'Task Queue', status: 'up' },
          { name: 'Database', status: 'up' },
          { name: 'WebSocket', status: 'up' }
        ];
        
        document.getElementById('servicesList').innerHTML = services.map(s => `
          <div class="service-item">
            <span>${s.name}</span>
            <div class="service-status">
              <span class="service-dot ${s.status}"></span>
              <span>${s.status === 'up' ? 'Operational' : s.status === 'degraded' ? 'Degraded' : 'Down'}</span>
            </div>
          </div>
        `).join('');
        
        // Update stats
        document.getElementById('totalMiners').textContent = stats?.network?.totalMiners || 0;
        document.getElementById('onlineMiners').textContent = stats?.network?.onlineMiners || 0;
        document.getElementById('tasksToday').textContent = stats?.tasks?.today || 0;
        document.getElementById('avgLatency').textContent = (stats?.performance?.avgLatency || 0) + 'ms';
        
        // Update uptime (mock for now)
        updateUptime('api', 99.9);
        updateUptime('tasks', 99.8);
        updateUptime('db', 100);
        
        document.getElementById('lastUpdated').textContent = 'Updated ' + new Date().toLocaleTimeString();
      } catch(e) {
        console.error('Failed to load health:', e);
      }
    }
    
    function updateUptime(service, value) {
      const bar = document.getElementById(service + 'Uptime');
      bar.innerHTML = `<div class="uptime-bar-fill" style="width: ${value}%;"></div>`;
      document.getElementById(service + 'UptimeValue').textContent = value.toFixed(1) + '%';
    }
    
    loadHealth();
    setInterval(loadHealth, 30000);
  </script>
</body>
</html>
