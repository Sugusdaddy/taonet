<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>History - TaoNet</title>
  <link rel="icon" type="image/svg+xml" href="icon.svg">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="header">
    <div class="container header-inner">
      <a href="/" class="logo">Tao<span>Net</span></a>
      <nav class="nav">
        <a href="mine.html">Mine</a>
        <a href="dashboard.html">Dashboard</a>
        <a href="leaderboard.html">Leaderboard</a>
        <a href="rewards.html">Rewards</a>
        <a href="docs.html">Docs</a>
      </nav>
      <div class="header-actions">
        <button class="wallet-btn" data-wallet-btn onclick="handleWalletClick()">Connect</button>
        <button class="menu-btn" onclick="toggleMenu()">&#9776;</button>
      </div>
    </div>
  </header>

  <main>
    <div class="container">
      <div class="page-header">
        <h1 class="page-title">Task History</h1>
        <p class="page-subtitle">Your completed tasks and rewards</p>
      </div>

      <!-- Not Connected -->
      <div data-show-disconnected>
        <div class="empty-state">
          <h3 class="mb-sm">Connect to View History</h3>
          <p class="text-secondary mb-lg">Connect your wallet to see your task history</p>
          <button class="btn btn-primary" onclick="handleWalletClick()">Connect Wallet</button>
        </div>
      </div>

      <!-- Connected -->
      <div data-show-connected class="hidden">
        <!-- Summary -->
        <div class="stats-grid mb-lg">
          <div class="stat-card">
            <div class="stat-value" id="totalTasks">0</div>
            <div class="stat-label">Total Tasks</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" id="totalRewards">0</div>
            <div class="stat-label">Total Rewards</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" id="avgReward">0</div>
            <div class="stat-label">Avg Reward</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" id="jackpotCount">0</div>
            <div class="stat-label">Jackpots Won</div>
          </div>
        </div>

        <!-- History Table -->
        <div class="table-container">
          <table>
            <thead>
              <tr>
                <th>Date</th>
                <th>Task</th>
                <th>Quality</th>
                <th>Response</th>
                <th>Reward</th>
              </tr>
            </thead>
            <tbody id="historyBody">
              <tr>
                <td colspan="5" class="text-center text-tertiary" style="padding: 60px;">Loading...</td>
              </tr>
            </tbody>
          </table>
        </div>

        <!-- Pagination -->
        <div class="pagination mt-lg">
          <button class="btn btn-secondary btn-sm" id="prevBtn" onclick="prevPage()" disabled>Previous</button>
          <span class="text-tertiary" id="pageInfo">Page 1</span>
          <button class="btn btn-secondary btn-sm" id="nextBtn" onclick="nextPage()">Next</button>
        </div>
      </div>
    </div>
  </main>

  <style>
    .empty-state {
      text-align: center;
      padding: 80px 20px;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
    }
    
    .jackpot-badge {
      display: inline-block;
      padding: 2px 8px;
      background: var(--gold);
      color: #000;
      border-radius: var(--radius-full);
      font-size: 10px;
      font-weight: 700;
      margin-left: var(--space-sm);
    }
    
    .pagination {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: var(--space-md);
    }
  </style>

  <script src="app.js"></script>
  <script>
    let page = 1;
    const limit = 20;
    let totalPages = 1;
    
    async function loadHistory() {
      if (!TAONET.wallet) return;
      
      const tbody = document.getElementById('historyBody');
      tbody.innerHTML = '<tr><td colspan="5" class="text-center text-tertiary" style="padding: 60px;">Loading...</td></tr>';
      
      try {
        const data = await TAONET.get(`/api/miners/${TAONET.wallet}/history?page=${page}&limit=${limit}`);
        
        if (data?.history?.length) {
          // Update stats
          document.getElementById('totalTasks').textContent = data.total || 0;
          document.getElementById('totalRewards').textContent = TAONET.formatNumber(data.totalRewards || 0);
          document.getElementById('avgReward').textContent = ((data.totalRewards || 0) / (data.total || 1)).toFixed(1);
          document.getElementById('jackpotCount').textContent = data.jackpotCount || 0;
          
          // Update pagination
          totalPages = Math.ceil((data.total || 0) / limit);
          document.getElementById('pageInfo').textContent = `Page ${page} of ${totalPages}`;
          document.getElementById('prevBtn').disabled = page <= 1;
          document.getElementById('nextBtn').disabled = page >= totalPages;
          
          // Render table
          tbody.innerHTML = data.history.map(item => `
            <tr>
              <td>${new Date(item.completedAt).toLocaleDateString()}</td>
              <td>
                ${item.taskId?.substring(0, 8) || '-'}...
                ${item.jackpot ? `<span class="jackpot-badge">${item.jackpot.toUpperCase()}</span>` : ''}
              </td>
              <td>${item.qualityScore || '-'}%</td>
              <td>${item.responseTime ? Math.round(item.responseTime) + 'ms' : '-'}</td>
              <td class="text-accent font-bold">+${item.reward || 0}</td>
            </tr>
          `).join('');
        } else {
          tbody.innerHTML = '<tr><td colspan="5" class="text-center text-tertiary" style="padding: 60px;">No task history yet</td></tr>';
        }
      } catch(e) {
        tbody.innerHTML = '<tr><td colspan="5" class="text-center text-tertiary" style="padding: 60px;">Failed to load history</td></tr>';
      }
    }
    
    function prevPage() {
      if (page > 1) {
        page--;
        loadHistory();
      }
    }
    
    function nextPage() {
      if (page < totalPages) {
        page++;
        loadHistory();
      }
    }
    
    document.addEventListener('DOMContentLoaded', () => {
      setTimeout(() => {
        if (TAONET.wallet) loadHistory();
      }, 100);
    });
  </script>
</body>
</html>
