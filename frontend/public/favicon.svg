<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800">
  <defs>
    <linearGradient id="purple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#0ea5e9"/>
    </linearGradient>
    <linearGradient id="mixed" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c084fc"/>
      <stop offset="50%" style="stop-color:#818cf8"/>
      <stop offset="100%" style="stop-color:#38bdf8"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="30"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="800" fill="#0c0a1d"/>
  
  <!-- Background glow -->
  <ellipse cx="400" cy="400" rx="350" ry="350" fill="#6366f1" opacity="0.08" filter="url(#softGlow)"/>
  
  <!-- DNA Helix Structure -->
  <g transform="translate(400,400)" filter="url(#glow)">
    <!-- Left strand -->
    <path d="M-60,-280 
             C-120,-220 -120,-160 -60,-100
             C0,-40 0,40 -60,100
             C-120,160 -120,220 -60,280" 
          stroke="url(#purple)" stroke-width="8" fill="none" stroke-linecap="round"/>
    
    <!-- Right strand -->
    <path d="M60,-280 
             C120,-220 120,-160 60,-100
             C0,-40 0,40 60,100
             C120,160 120,220 60,280" 
          stroke="url(#cyan)" stroke-width="8" fill="none" stroke-linecap="round"/>
    
    <!-- Cross connections (base pairs) -->
    <g stroke="url(#mixed)" stroke-width="4" opacity="0.8">
      <line x1="-55" y1="-240" x2="55" y2="-240"/>
      <line x1="-85" y1="-180" x2="85" y2="-180"/>
      <line x1="-60" y1="-120" x2="60" y2="-120"/>
      <line x1="-20" y1="-60" x2="20" y2="-60"/>
      <line x1="-20" y1="0" x2="20" y2="0"/>
      <line x1="-20" y1="60" x2="20" y2="60"/>
      <line x1="-60" y1="120" x2="60" y2="120"/>
      <line x1="-85" y1="180" x2="85" y2="180"/>
      <line x1="-55" y1="240" x2="55" y2="240"/>
    </g>
    
    <!-- Nodes at intersections -->
    <g>
      <circle cx="-60" cy="-280" r="10" fill="url(#purple)"/>
      <circle cx="60" cy="-280" r="10" fill="url(#cyan)"/>
      <circle cx="-60" cy="280" r="10" fill="url(#purple)"/>
      <circle cx="60" cy="280" r="10" fill="url(#cyan)"/>
      
      <!-- Center nodes -->
      <circle cx="-20" cy="0" r="8" fill="url(#purple)"/>
      <circle cx="20" cy="0" r="8" fill="url(#cyan)"/>
    </g>
    
    <!-- Center emblem -->
    <circle cx="0" cy="0" r="45" fill="#0c0a1d" stroke="url(#mixed)" stroke-width="3"/>
    <text x="0" y="16" font-family="SF Pro Display, -apple-system, Arial Black" font-size="48" font-weight="900" fill="url(#mixed)" text-anchor="middle">T</text>
  </g>
  
  <!-- Floating particles -->
  <g fill="url(#mixed)" opacity="0.5">
    <circle cx="250" cy="200" r="3"/>
    <circle cx="550" cy="200" r="2"/>
    <circle cx="280" cy="600" r="2"/>
    <circle cx="520" cy="600" r="3"/>
    <circle cx="180" cy="400" r="2"/>
    <circle cx="620" cy="400" r="2"/>
  </g>
</svg>